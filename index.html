<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<title>Eduardo Lagoeiro</title>
	<link rel="shortcut icon" type="image/ico" href="img/favicon.ico"/>
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			background: #0a0a0f;
			color: #faf5eb;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
		}
		.container {
			padding: 40px 20px;
		}
		h1 {
			font-size: clamp(24px, 5vw, 40px);
			font-weight: 300;
			letter-spacing: 2px;
			margin-bottom: 12px;
			opacity: 0.8;
		}
		p {
			font-size: 14px;
			color: rgba(250, 245, 235, 0.35);
			letter-spacing: 4px;
			text-transform: uppercase;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>em construção</h1>
		<p>since 2018</p>
	</div>
</body>
</html>
